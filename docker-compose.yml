services:
  # Core runtime and CLI toolbox
  ai-cli-base:
    build:
      context: ./images/ai-cli-base
      dockerfile: Dockerfile
      network: host
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-2.1.214}
    container_name: ai-cli-base
    restart: unless-stopped
    stdin_open: true
    tty: true
    user: "${USER_UID:-1000}:${USER_GID:-1000}"
    environment:
      - USER_UID=${USER_UID:-1000}
      - USER_GID=${USER_GID:-1000}
      - HOME=/home/node
      - ANTHROPIC_BASE_URL=http://omniroute:20128/v1
    volumes:
      # Developer workspace
      - ${WORKSPACE_PATH:-./shared/workspace}:/workspace
      # Shared authentication stores
      - ${CLAUDE_CONFIG_PATH:-./shared/claude}:/home/node/.claude
      - ${ANTIGRAVITY_CONFIG_PATH:-./shared/antigravity}:/home/node/.config/antigravity
      # Cache and package stores to avoid re-downloads
      - ${NPM_CACHE_PATH:-./shared/npm}:/home/node/.npm
      - ${GENERAL_CACHE_PATH:-./shared/cache}:/home/node/.cache
      - ${SSH_PATH:-./shared/ssh}:/home/node/.ssh:ro
      - ${SHARED_CONFIG_PATH:-./shared/config}:/home/node/.config/shared
    working_dir: /workspace
    networks:
      - ai-platform-net
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # OmniRoute Wrapper Service (Milestone 4)
  omniroute:
    build:
      context: ./omniroute
      dockerfile: Dockerfile
      network: host
    container_name: ai-omniroute
    restart: unless-stopped
    ports:
      - "${OMNIROUTE_PORT:-42000}:20128"
    environment:
      - PORT=20128
      - HOME=/home/node
      - CORS_ORIGINS=*
      - CORS_ALLOWED_ORIGINS=*
    volumes:
      # Developer workspace
      - ${WORKSPACE_PATH:-./shared/workspace}:/workspace
      # Shared authentication stores
      - ${CLAUDE_CONFIG_PATH:-./shared/claude}:/home/node/.claude
      - ${ANTIGRAVITY_CONFIG_PATH:-./shared/antigravity}:/home/node/.config/antigravity
      # Cache and package stores to avoid re-downloads
      - ${NPM_CACHE_PATH:-./shared/npm}:/home/node/.npm
      - ${GENERAL_CACHE_PATH:-./shared/cache}:/home/node/.cache
    networks:
      - ai-platform-net

  # OpenDesign Wrapper Service (Milestone 5)
  opendesign:
    build:
      context: ./scratch/open-design-repo
      dockerfile: ../../opendesign/Dockerfile
      network: host
    container_name: ai-opendesign
    restart: unless-stopped
    ports:
      - "${OPENDESIGN_PORT:-43000}:7456"
    environment:
      - OD_PORT=7456
      - OD_BIND_HOST=0.0.0.0
      - OD_DISABLE_API_AUTH=1
      - OD_WEB_PORT=${OPENDESIGN_PORT:-43000}
      - OD_ALLOWED_INTERNAL_HOSTS=omniroute,ai-omniroute,localhost,127.0.0.1
      - NODE_ENV=production
      - HOME=/home/node
    volumes:
      # Developer workspace
      - ${WORKSPACE_PATH:-./shared/workspace}:/workspace
      # Shared authentication stores
      - ${CLAUDE_CONFIG_PATH:-./shared/claude}:/home/node/.claude
      - ${ANTIGRAVITY_CONFIG_PATH:-./shared/antigravity}:/home/node/.config/antigravity
      # Cache and package stores to avoid re-downloads
      - ${NPM_CACHE_PATH:-./shared/npm}:/home/node/.npm
      - ${GENERAL_CACHE_PATH:-./shared/cache}:/home/node/.cache
    networks:
      - ai-platform-net

  # VS Code Server Web Editor (Developer Extension)
  vscode:
    build:
      context: ./vscode
      dockerfile: Dockerfile
      network: host
    container_name: ai-vscode
    restart: unless-stopped
    ports:
      - "${VSCODE_PORT:-44000}:8080"
    environment:
      - PASSWORD=${VSCODE_PASSWORD:-password}
      - HOME=/home/node
      - ANTHROPIC_BASE_URL=http://omniroute:20128/v1
    volumes:
      # Developer workspace
      - ${WORKSPACE_PATH:-./shared/workspace}:/workspace
      # Shared credentials
      - ${CLAUDE_CONFIG_PATH:-./shared/claude}:/home/node/.claude
      - ${ANTIGRAVITY_CONFIG_PATH:-./shared/antigravity}:/home/node/.config/antigravity
      - ${NPM_CACHE_PATH:-./shared/npm}:/home/node/.npm
      - ${GENERAL_CACHE_PATH:-./shared/cache}:/home/node/.cache
      - ${SSH_PATH:-./shared/ssh}:/home/node/.ssh
      - ${SHARED_CONFIG_PATH:-./shared/config}:/home/node/.config
    networks:
      - ai-platform-net

networks:
  ai-platform-net:
    name: ai-platform-net
    driver: bridge
